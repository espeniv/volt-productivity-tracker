appId: com.voltapp.app
productName: Volt
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    # Make the packaged app a true menu-bar agent: no dock icon by default,
    # no Cmd+Tab entry. `app.dock.show()` can still surface the icon at
    # runtime when the user toggles "Hide app icon in dock" off, and we
    # use it during first-run onboarding so the app is discoverable.
    LSUIElement: true
  # Skip code signing for local/personal builds. macOS will require a right-click
  # → Open the first time you launch the unsigned .app. Set this to your real
  # Developer ID identity ("Developer ID Application: Your Name (TEAMID)") when
  # you're ready to ship a signed + notarized DMG.
  identity: "Developer ID Application: Espen Iversen (NFJ7LFXU34)" 
dmg:
  artifactName: Volt-${version}-${arch}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
